name: Quant Bot

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:

  run-bot:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

        with:

          python-version: "3.11"

      - name: Install

        run: |

          pip install -r requirements.txt

      - name: Run Bot

        env:

          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

          CHAT_ID: ${{ secrets.CHAT_ID }}

        run: python main.py
